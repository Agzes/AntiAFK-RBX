name: 🐞 Bug Report
description: Report a bug in AntiAFK-RBX
title: "[Bug]: "
labels: ["bug"]
assignees:
    - agzes
body:
    - type: markdown
      attributes:
          value: "## Thank you for taking the time to report this bug! Please fill out this short form."
    - type: input
      id: version
      attributes:
          label: Version
          placeholder: e.g. v4.0.0-alpha1
      validations:
          required: true
    - type: textarea
      id: steps
      attributes:
          label: Steps to Reproduce
          placeholder: |
              1. Click ...
              2. Press ...
              3. Bug happens
      validations:
          required: true
    - type: textarea
      id: expected
      attributes:
          label: Expected Behavior (optional)
          placeholder: What should have happened?
    - type: textarea
      id: actual
      attributes:
          label: Actual Behavior (optional)
          placeholder: What actually happened?
    - type: textarea
      id: context
      attributes:
          label: Extra Context / Screenshots (optional)
          placeholder: Any logs, images, or details.
