name: Build AntiAFK-RBX

on:
  push:
    branches: [preview]
    tags: ['v*']

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        configuration: [Release]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build solution
        run: msbuild AntiAFK-RBX.sln /p:Configuration=${{ matrix.configuration }} /p:Platform=x64 /m

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AntiAFK-RBX-${{ matrix.configuration }}
          path: x64/${{ matrix.configuration }}/*.exe

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: AntiAFK-RBX-Release
          path: ./release

      - name: Rename exe
        shell: pwsh
        env:
          TAG: ${{ github.ref_name }}
        run: |
          $version = $env:TAG -replace '^v\.', ''
          Get-ChildItem ./release/*.exe | Rename-Item -NewName "AntiAFK-RBX.$version.exe"

      - name: Create pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: AntiAFK-RBX ${{ github.ref_name }}
          prerelease: true
          files: ./release/*.exe
          body: |
            <div align="center">

            <h1 align="center">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; $\Huge{\textsf{AntiAFK-RBX}}$ <sup><sup><kbd>${{ github.ref_name }}</kbd></sup></sup></h1>

            <kbd align="left">

            <div align="center"><kbd>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<kbd>⚒️</kbd> <kbd>ChangeLog</kbd>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</kbd></div>

            ## Auto-Built - no changelog provided
            Changelog will be available soon.

            <div align="center"><br>

            ## Note
            **This release was automatically built from the preview branch.
            Download the stable version here: [Latest Stable](https://github.com/Agzes/AntiAFK-RBX/releases/latest)**
